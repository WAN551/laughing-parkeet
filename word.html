<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Word Guess</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow: hidden;
        }
        .header { text-align: center; color: white; margin-bottom: 18px; }
        .title { font-size: 32px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-bottom: 6px; }
        .question-num { font-size: 17px; opacity: 0.9; }

        /* 关卡选择 */
        .level-select { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .lvl-btn {
            padding: 10px 22px; border: none; border-radius: 22px;
            font-size: 15px; font-weight: bold; cursor: pointer; color: white;
            box-shadow: 0 3px 12px rgba(0,0,0,0.2);
        }
        .lv1 { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .lv2 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .lv3 { background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .lv4 { background: linear-gradient(135deg, #fa709a, #fee140); }
        .lv5 { background: linear-gradient(135deg, #a18cd1, #fbc2eb); }

        /* 提示 */
        .hint-bar {
            color: white; font-size: 20px; font-weight: bold;
            background: rgba(255,255,255,0.15);
            padding: 10px 30px; border-radius: 25px;
            margin-bottom: 18px;
            letter-spacing: 6px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        .game-area { display: flex; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
        .letter-box {
            position: relative; width: 60px; height: 72px;
        }
        .letter-char {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: bold;
            color: #333; z-index: 1;
            text-transform: uppercase;
        }
        .letter-cover {
            position: absolute; top: 3px; left: 3px;
            width: 54px; height: 66px;
            border-radius: 8px; cursor: pointer; z-index: 2;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: rgba(255,255,255,0.5);
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
        }
        .lc-blue { background: linear-gradient(145deg, #4facfe, #00f2fe); border: 2px solid #0099db; }
        .lc-green { background: linear-gradient(145deg, #43e97b, #38f9d7); border: 2px solid #30A87C; }
        .lc-orange { background: linear-gradient(145deg, #fa709a, #fee140); border: 2px solid #E89B28; }
        .lc-purple { background: linear-gradient(145deg, #a18cd1, #fbc2eb); border: 2px solid #B08DD4; }
        .lc-red { background: linear-gradient(145deg, #ff9a9e, #fecfef); border: 2px solid #E88A90; }
        .letter-cover.hidden { opacity: 0; pointer-events: none; }

        /* 答案选项 */
        .options-area {
            display: flex; gap: 8px; flex-wrap: wrap;
            justify-content: center; margin-bottom: 15px; max-width: 500px;
        }
        .option-btn {
            padding: 8px 16px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer; color: white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
        }
        .op-correct { background: #00C853; }
        .op-wrong { background: #FF5252; opacity: 0.5; }
        .op-normal { background: rgba(255,255,255,0.25); border: 2px solid rgba(255,255,255,0.4); }

        .result-msg {
            font-size: 20px; font-weight: bold; color: white;
            min-height: 28px; margin-bottom: 10px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }
        .msg-ok { color: #69F0AE; }
        .msg-err { color: #FF5252; }

        .controls { display: flex; gap: 16px; }
        .btn {
            padding: 11px 28px; font-size: 17px; border: none;
            border-radius: 24px; cursor: pointer; font-weight: bold; color: white;
            box-shadow: 0 4px 14px rgba(0,0,0,0.2);
        }
        .btn-green { background: #00C853; }
        .btn-orange { background: #FF6D00; }

        .progress { display: flex; gap: 5px; margin-top: 12px; flex-wrap: wrap; justify-content: center; max-width: 400px; }
        .progress-dot { width: 13px; height: 13px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; }
        .progress-dot.active { background: white; transform: scale(1.3); }
        .progress-dot.done { background: #4CAF50; }
        .progress-dot.wrong { background: #FF5252; }

        .complete-msg {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white; padding: 30px 45px; border-radius: 15px;
            text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.4); z-index: 100;
        }
        .complete-msg.show { transform: translate(-50%, -50%) scale(1); }
        .complete-msg h2 { color: #4CAF50; font-size: 26px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="title">Word Guess Game</div>
    <div class="question-num" id="questionNum">Select a level to start</div>
</div>

<div class="level-select" id="levelSelect">
    <button class="lvl-btn lv1" onclick="startLevel(1)">Animals</button>
    <button class="lvl-btn lv2" onclick="startLevel(2)">Fruits</button>
    <button class="lvl-btn lv3" onclick="startLevel(3)">Tools</button>
    <button class="lvl-btn lv4" onclick="startLevel(4)">Places</button>
    <button class="lvl-btn lv5" onclick="startLevel(5)">Mixed!</button>
</div>

<div class="hint-bar" id="hintBar"></div>

<div class="game-area" id="gameArea"></div>

<div class="options-area" id="optArea"></div>

<div class="result-msg" id="resultMsg"></div>

<div class="controls" id="controls" style="visibility:hidden;">
    <button class="btn btn-orange" onclick="prevQ()">Previous</button>
    <button class="btn btn-green" onclick="nextQ()">Next</button>
</div>

<div class="progress" id="progress"></div>

<div class="complete-msg" id="completeMsg">
    <h2>Great Job!</h2>
    <p id="finalScoreText"></p>
    <button class="btn btn-green" style="margin-top:12px;" onclick="resetGame()">Play Again</button>
</div>

<script>
// ==================== 题库 ====================
var LEVELS = {
    // Level 1: Animals
    1: [
        { word: 'CAT', hint: 'C _ _', options: ['CAT','DOG','COW','PIG'] },
        { word: 'DOG', hint: 'D _ G', options: ['DOG','CAT','FOX','BAT'] },
        { word: 'LION', hint: 'L _ _ N', options: ['LION','BEAR','FROG','DUCK'] },
        { word: 'TIGER', hint: 'T _ _ E R', options: ['TIGER','LION','BEAR','PANDA'] },
        { word: 'ELEPHANT', hint: 'E L E _ _ _ N T', options: ['ELEPHANT','GIRAFFE','MONKEY','RABBIT'] },
        { word: 'PANDA', hint: 'P _ _ D A', options: ['PANDA','KOALA','PENGUIN','ZEBRA'] },
        { word: 'RABBIT', hint: 'R A _ _ I T', options: ['RABBIT','HAMSTER','MOUSE','GUINEA'] },
        { word: 'MONKEY', hint: 'M O N _ _ Y', options: ['MONKEY','GORILLA','CHIMPANZEE','ORANGUTAN'] },
        { word: 'DOLPHIN', hint: 'D O L P _ _ N', options: ['DOLPHIN','WHALE','SHARK','OCTOPUS'] },
        { word: 'PENGUIN', hint: 'P E N G U _ N', options: ['PENGUIN','SEAGULL','PARROT','EAGLE'] },
        { word: 'SNAKE', hint: 'S N _ K E', options: ['SNAKE','LIZARD','TURTLE','FROG'] },
        { word: 'ZEBRA', hint: 'Z E B _ A', options: ['ZEBRA','HORSE','DONKEY','CAMEL'] },
        { word: 'GIRAFFE', hint: 'G I R A _ F E', options: ['GIRAFFE','DEER','CAMEL','BUFFALO'] },
        { word: 'KANGAROO', hint: 'K A N _ A R O O', options: ['KANGAROO','KOALA','WALLABY','OPOSSUM'] },
        { word: 'OCTOPUS', hint: 'O C T _ P U S', options: ['OCTOPUS','JELLYFISH','STARFISH','CRAB'] }
    ],
    // Level 2: Fruits
    2: [
        { word: 'APPLE', hint: 'A P P L E', options: ['APPLE','GRAPE','PEACH','MANGO'] },
        { word: 'BANANA', hint: 'B A N _ _ A', options: ['BANANA','ORANGE','MELON','CHERRY'] },
        { word: 'ORANGE', hint: 'O R A _ _ E', options: ['ORANGE','MANGO','LEMON','PEACH'] },
        { word: 'GRAPE', hint: 'G R A _ E', options: ['GRAPE','BERRY','PLUM','FIG'] },
        { word: 'STRAWBERRY', hint: 'S T R _ W B E R R Y', options: ['STRAWBERRY','BLUEBERRY','RASPBERRY','BLACKBERRY'] },
        { word: 'WATERMELON', hint: 'W A T E R M E _ _ N', options: ['WATERMELON','HONEYDEW','CANTALOUPE','PAPAYA'] },
        { word: 'PINEAPPLE', hint: 'P I N E A P _ L E', options: ['PINEAPPLE','COCONUT','MANGO','GUAVA'] },
        { word: 'PEACH', hint: 'P E _ C H', options: ['PEACH','APRICOT','NECTARINE','PLUM'] },
        { word: 'CHERRY', hint: 'C H E R _ Y', options: ['CHERRY','BERRY','GRAPE','FIG'] },
        { word: 'MANGO', hint: 'M A N _ O', options: ['MANGO','PAPAYA','GUAVA','LYCHEE'] },
        { word: 'LEMON', hint: 'L E M _ N', options: ['LEMON','LIME','GRAPEFRUIT','ORANGE'] },
        { word: 'COCONUT', hint: 'C O C O N U T', options: ['COCONUT','PALM','DATE','FIG'] },
        { word: 'KIWI', hint: 'K _ W I', options: ['KIWI','MELON','PEAR','PLUM'] },
        { word: 'AVOCADO', hint: 'A V O C _ D O', options: ['AVOCADO','OLIVE','MANGO','PAPAYA'] },
        { word: 'DRAGON', hint: 'D R A _ O N', options: ['DRAGON','PASSION','MANGO','LYCHEE'] }
    ],
    // Level 3: Tools
    3: [
        { word: 'PENCIL', hint: 'P E N C _ L', options: ['PENCIL','PEN','CRAYON','BRUSH'] },
        { word: 'RULER', hint: 'R U L _ R', options: ['RULER','SCISSORS','ERASER','GLUE'] },
        { word: 'SCISSORS', hint: 'S C I S S _ R S', options: ['SCISSORS','KNIFE','CUTTER','SAW'] },
        { word: 'ERASER', hint: 'E R A _ E R', options: ['ERASER','PAPER','BOOK','NOTEBOOK'] },
        { word: 'COMPUTER', hint: 'C O M P U _ E R', options: ['COMPUTER','LAPTOP','TABLET','PHONE'] },
        { word: 'KEYBOARD', hint: 'K E Y B O _ R D', options: ['KEYBOARD','MOUSE','MONITOR','PRINTER'] },
        { word: 'PHONE', hint: 'P H _ N E', options: ['PHONE','TABLET','CAMERA','RADIO'] },
        { word: 'CAMERA', hint: 'C A M E _ A', options: ['CAMERA','VIDEO','PHOTO','PICTURE'] },
        { word: 'UMBRELLA', hint: 'U M B R _ L L A', options: ['UMBRELLA','RAINCOAT','BOOTS','HAT'] },
        { word: 'CLOCK', hint: 'C L O _ K', options: ['CLOCK','WATCH','TIMER','ALARM'] },
        { word: 'LAMP', hint: 'L A _ P', options: ['LAMP','LIGHT','BULB','TORCH'] },
        { word: 'BRUSH', hint: 'B R U _ H', options: ['BRUSH','COMB','TOOTHBRUSH','PAINT'] },
        { word: 'HAMMER', hint: 'H A M _ E R', options: ['HAMMER','WRENCH','SCREWDRIVER','PLIERS'] },
        { word: 'NEEDLE', hint: 'N E E D _ E', options: ['NEEDLE','THREAD','PIN','BUTTON'] },
        { word: 'LOCK', hint: 'L _ C K', options: ['LOCK','KEY','CHAIN','DOOR'] }
    ],
    // Level 4: Places
    4: [
        { word: 'SCHOOL', hint: 'S C H O _ L', options: ['SCHOOL','HOSPITAL','LIBRARY','MUSEUM'] },
        { word: 'HOSPITAL', hint: 'H O S P _ T A L', options: ['HOSPITAL','CLINIC','PHARMACY','OFFICE'] },
        { word: 'LIBRARY', hint: 'L I B _ A R Y', options: ['LIBRARY','BOOKSTORE','SCHOOL','OFFICE'] },
        { word: 'PARK', hint: 'P A _ K', options: ['PARK','GARDEN','FOREST','BEACH'] },
        { word: 'RESTAURANT', hint: 'R E S T A U _ _ N T', options: ['RESTAURANT','CAFE','BAR','KITCHEN'] },
        { word: 'AIRPORT', hint: 'A I R _ O R T', options: ['AIRPORT','STATION','PORT','TERMINAL'] },
        { word: 'STATION', hint: 'S T A _ I O N', options: ['STATION','AIRPORT','STOP','TERMINAL'] },
        { word: 'MARKET', hint: 'M A R _ E T', options: ['MARKET','STORE','SHOP','MALL'] },
        { word: 'THEATER', hint: 'T H E _ T E R', options: ['THEATER','CINEMA','STADIUM','MUSEUM'] },
        { word: 'MUSEUM', hint: 'M U S E _ M', options: ['MUSEUM','GALLERY','THEATER','LIBRARY'] },
        { word: 'CASTLE', hint: 'C A S _ L E', options: ['CASTLE','PALACE','TEMPLE','CHURCH'] },
        { word: 'BRIDGE', hint: 'B R I _ G E', options: ['BRIDGE','ROAD','TUNNEL','HIGHWAY'] },
        { word: 'ISLAND', hint: 'I S L _ N D', options: ['ISLAND','BEACH','MOUNTAIN','VALLEY'] },
        { word: 'VILLAGE', hint: 'V I L _ A G E', options: ['VILLAGE','TOWN','CITY','COUNTRY'] },
        { word: 'FACTORY', hint: 'F A C _ O R Y', options: ['FACTORY','FARM','MILL','PLANT'] }
    ],
    // Level 5: Mixed (random from all)
    5: []
};

// Fill level 5 with random picks from all levels
var allWords = [];
for (var lvl = 1; lvl <= 4; lvl++) {
    allWords = allWords.concat(LEVELS[lvl]);
}
allWords.sort(function(){return Math.random()-0.5});
LEVELS[5] = allWords.slice(0, 15);

var pool = [];
var qIdx = 0;
var score = 0;

function startLevel(level) {
    pool = LEVELS[level].slice();
    qIdx = 0;
    score = 0;

    document.getElementById('levelSelect').style.display = 'none';
    document.getElementById('controls').style.visibility = 'visible';
    loadQ();
}

function loadQ() {
    if (qIdx >= pool.length) {
        showComplete();
        return;
    }

    var item = pool[qIdx];
    document.getElementById('questionNum').textContent = 'Question ' + (qIdx+1) + ' / ' + pool.length;
    document.getElementById('hintBar').textContent = item.hint.replace(/_/g, '_');
    document.getElementById('resultMsg').textContent = '';
    document.getElementById('resultMsg').className = 'result-msg';

    renderLetters(item.word);
    renderOptions(item);
    updateProgress();
}

function renderLetters(word) {
    var area = document.getElementById('gameArea');
    area.innerHTML = '';
    for (var i = 0; i < word.length; i++) {
        (function(ch, ci) {
            var box = document.createElement('div');
            box.className = 'letter-box';

            var chEl = document.createElement('div');
            chEl.className = 'letter-char';
            chEl.textContent = ch;

            var cover = document.createElement('div');
            cover.className = 'letter-cover lc' + ((ci % 5) + 1);
            cover.textContent = '?';
            cover.onclick = function() {
                if (!cover.classList.contains('hidden')) {
                    cover.classList.add('hidden');
                }
            };

            box.appendChild(chEl);
            box.appendChild(cover);
            area.appendChild(box);
        })(word[i], i);
    }
}

function renderOptions(item) {
    var area = document.getElementById('optArea');
    area.innerHTML = '';
    var opts = item.options.slice();
    opts.sort(function(){return Math.random()-0.5});

    for (var i = 0; i < opts.length; i++) {
        (function(opt) {
            var btn = document.createElement('button');
            btn.className = 'option-btn op-normal';
            btn.textContent = opt;
            btn.onclick = function() {
                checkAnswer(opt, item.word, btn);
            };
            area.appendChild(btn);
        })(opts[i]);
    }
}

function checkAnswer(selected, correct, btn) {
    var buttons = document.getElementById('optArea').querySelectorAll('.option-btn');
    for (var b = 0; b < buttons.length; b++) {
        buttons[b].onclick = null;
        buttons[b].classList.remove('op-normal');
        if (buttons[b].textContent === correct) {
            buttons[b].classList.add('op-correct');
        } else {
            buttons[b].classList.add('op-wrong');
        }
    }

    var msg = document.getElementById('resultMsg');
    if (selected === correct) {
        score += 10;
        msg.textContent = 'Correct! +10 points!';
        msg.className = 'result-msg msg-ok';
    } else {
        msg.textContent = 'Wrong! The answer is: ' + correct;
        msg.className = 'result-msg msg-err';
    }

    revealAll();
}

function revealAll() {
    var covers = document.querySelectorAll('.letter-cover');
    for (var c = 0; c < covers.length; c++) {
        covers[c].classList.add('hidden');
    }
}

function nextQ() {
    qIdx++;
    loadQ();
}

function prevQ() {
    if (qIdx > 0) {
        qIdx--;
        loadQ();
    }
}

function updateProgress() {
    var el = document.getElementById('progress');
    el.innerHTML = '';
    for (var i = 0; i < pool.length; i++) {
        (function(ii) {
            var d = document.createElement('div');
            d.className = 'progress-dot';
            d.onclick = function() { qIdx = ii; loadQ(); };
            if (ii < qIdx) d.className += ' done';
            else if (ii === qIdx) d.className += ' active';
            el.appendChild(d);
        })(i);
    }
}

function showComplete() {
    document.getElementById('completeMsg').classList.add('show');
    var total = pool.length * 10;
    var pct = Math.round((score / total) * 100);
    document.getElementById('finalScoreText').textContent = 'Score: ' + score + '/' + total + ' (' + pct + '%)';
}

function resetGame() {
    document.getElementById('completeMsg').classList.remove('show');
    document.getElementById('levelSelect').style.display = 'flex';
    document.getElementById('controls').style.visibility = 'hidden';
}
</script>

</body>
</html>
