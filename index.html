<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>遮字猜猜看</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        .title {
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 8px;
        }
        .question-num { font-size: 18px; opacity: 0.9; }
        .game-area {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }
        .char-container {
            position: relative;
            width: 100px;
            height: 120px;
        }
        .char {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: bold;
            color: #333;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .grid {
            position: absolute;
            top: 5px;
            left: 5px;
            width: 90px;
            height: 110px;
            background: linear-gradient(145deg, #FFD700, #FFA500);
            border-radius: 10px;
            cursor: pointer;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: rgba(255,255,255,0.6);
            border: 3px solid #E69400;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }
        .grid.hidden {
            display: none;
        }
        .controls { display: flex; gap: 16px; }
        .btn {
            padding: 12px 32px;
            font-size: 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-green { background: #00C853; }
        .btn-orange { background: #FF6D00; }
        .progress {
            display: flex;
            gap: 6px;
            margin-top: 15px;
        }
        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
        }
        .progress-dot.active { background: white; transform: scale(1.2); }
        .progress-dot.done { background: #4CAF50; }
        .complete-msg {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 30px 50px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            z-index: 100;
            transition: transform 0.3s ease;
        }
        .complete-msg.show { transform: translate(-50%, -50%) scale(1); }
        .complete-msg h2 { color: #4CAF50; font-size: 28px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="title">遮字猜猜看</div>
    <div class="question-num" id="questionNum">第 1 题 / 共 16 题</div>
</div>

<div class="game-area" id="gameArea"></div>
<div class="progress" id="progress"></div>

<div class="controls">
    <button class="btn btn-orange" onclick="prevQuestion()">上一题</button>
    <button class="btn btn-green" onclick="nextQuestion()">下一题</button>
</div>

<div class="complete-msg" id="completeMsg">
    <h2>太棒了！</h2>
    <p>全部完成！</p>
</div>

<script>
var idioms = [
    "对牛弹琴","马到成功","画蛇添足","守株待兔",
    "亡羊补牢","狐假虎威","杯弓蛇影","叶公好龙",
    "精卫填海","愚公移山","盲人摸象","刻舟求剑",
    "掩耳盗铃","拔苗助长","滥竽充数","买椟还珠"
];
var currentIdx = 0;

function showQuestion(idx) {
    if (idx >= idioms.length) {
        document.getElementById('completeMsg').classList.add('show');
        setTimeout(function() {
            document.getElementById('completeMsg').classList.remove('show');
        }, 2000);
        return;
    }
    currentIdx = idx;
    document.getElementById('questionNum').textContent = '第 ' + (idx + 1) + ' 题 / 共 ' + idioms.length + ' 题';
    
    var gameArea = document.getElementById('gameArea');
    gameArea.innerHTML = '';
    
    var chars = idioms[idx];
    for (var i = 0; i < chars.length; i++) {
        var container = document.createElement('div');
        container.className = 'char-container';
        
        var charEl = document.createElement('div');
        charEl.className = 'char';
        charEl.textContent = chars[i];
        
        var grid = document.createElement('div');
        grid.className = 'grid';
        grid.textContent = '?';
        
        grid.onclick = function() {
            if (!this.classList.contains('hidden')) {
                this.classList.add('hidden');
            }
        };
        
        container.appendChild(charEl);
        container.appendChild(grid);
        gameArea.appendChild(container);
    }
    
    updateProgress();
}

function nextQuestion() {
    if (currentIdx < idioms.length - 1) {
        showQuestion(currentIdx + 1);
    } else {
        document.getElementById('completeMsg').classList.add('show');
        setTimeout(function() {
            document.getElementById('completeMsg').classList.remove('show');
        }, 2000);
    }
}

function prevQuestion() {
    if (currentIdx > 0) {
        showQuestion(currentIdx - 1);
    }
}

function renderProgress() {
    var progressEl = document.getElementById('progress');
    progressEl.innerHTML = '';
    for (var i = 0; i < idioms.length; i++) {
        var dot = document.createElement('div');
        dot.className = 'progress-dot';
        dot.onclick = (function(idx) { return function() { showQuestion(idx); }; })(i);
        progressEl.appendChild(dot);
    }
}

function updateProgress() {
    var dots = document.querySelectorAll('.progress-dot');
    for (var i = 0; i < dots.length; i++) {
        dots[i].className = 'progress-dot';
        if (i < currentIdx) dots[i].className += ' done';
        else if (i === currentIdx) dots[i].className += ' active';
    }
}

// 初始化
renderProgress();
showQuestion(0);
</script>

</body>
</html>
